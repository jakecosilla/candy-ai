version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:15
    environment:
      - POSTGRES_USER=candy
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=candy_ai
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=candy
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      - postgres

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  ai-api:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    command: ["python", "main.py", "api"]
    environment:
      - TEMPORAL_HOST=temporal:7233
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - temporal

  ai-worker:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    command: ["python", "main.py", "worker"]
    environment:
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      - temporal

  sync-worker:
    build:
      context: ./services/sync-service
      dockerfile: Dockerfile
    environment:
      - TEMPORAL_HOST=temporal:7233
      - DATABASE_URL=postgres://candy:password@postgres:5432/candy_ai?sslmode=disable
    depends_on:
      - temporal
      - postgres

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
      - ai-api
